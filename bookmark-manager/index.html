<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmark Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:       #7aa2f7;
      --accent-hover: #6d93e8;
      --bg:           #1a1b26;
      --bg-alt:       #16161e;
      --surface:      #24283b;
      --surface-hi:   #2a2f45;
      --border:       #292e42;
      --text:         #c0caf5;
      --text-muted:   #565f89;
      --tag-bg:       #1e2335;
      --tag-color:    #7dcfff;
      --domain-color: #bb9af7;
      --error:        #f7768e;
      --radius: 8px;
      --sidebar-w: 200px;
    }

    body {
      font-family: "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, monospace;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      color-scheme: dark;
    }

    /* ── Scrollbars ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ── Animations ── */
    @keyframes card-in {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes content-swap {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes backdrop-in {
      from { background: rgba(0,0,0,0); }
      to   { background: rgba(0,0,0,0.55); }
    }
    @keyframes modal-in {
      from { opacity: 0; transform: scale(0.96) translateY(-10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .card { animation: card-in 0.18s cubic-bezier(0.22, 1, 0.36, 1) both; }
    .card--swap { animation: content-swap 0.14s ease both; }

    /* ── Header ── */
    header {
      background: var(--bg-alt);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    #search {
      flex: 1;
      max-width: 360px;
      padding: 6px 11px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
      appearance: none;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--text-muted); }

    #btn-add {
      margin-left: auto;
      padding: 6px 14px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #btn-add:hover { background: var(--accent-hover); }

    /* ── Body layout ── */
    .body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    aside {
      width: var(--sidebar-w);
      background: var(--bg-alt);
      border-right: 1px solid var(--border);
      padding: 20px 0;
      overflow-y: auto;
      flex-shrink: 0;
    }

    aside h2 {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 16px 10px;
    }

    #tag-list { list-style: none; }

    #tag-list li button {
      width: 100%;
      text-align: left;
      padding: 6px 16px;
      background: none;
      border: none;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 0;
      transition: background 0.1s, color 0.1s;
    }
    #tag-list li button:hover { background: var(--surface); }
    #tag-list li button.active {
      background: var(--tag-bg);
      color: var(--tag-color);
      font-weight: 500;
    }
    #tag-list li button .count {
      font-size: 11px;
      color: var(--text-muted);
    }
    #tag-list li button.active .count { color: var(--tag-color); }

    /* ── Main ── */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: var(--text-muted);
    }
    #empty-state p { font-size: 14px; }
    #empty-state .hint { font-size: 12px; }

    /* ── Bookmark cards ── */
    #bookmark-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: var(--text-muted); }

    .card-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
      min-width: 0;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .card-domain {
      font-size: 11px;
      font-weight: 500;
      color: var(--domain-color);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-url {
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
      margin-bottom: 6px;
      transition: color 0.12s;
    }
    .card-url:hover { color: var(--accent); text-decoration: underline; }

    .card-notes {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 11px;
      font-weight: 500;
      background: var(--tag-bg);
      color: var(--tag-color);
      padding: 2px 7px;
      border-radius: 999px;
      border: 1px solid #1e3a5f;
    }

    .card-actions {
      margin-left: auto;
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .card-actions button {
      background: none;
      border: none;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      color: var(--text-muted);
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.1s, background 0.1s;
    }
    .card-actions button:hover { color: var(--text); background: var(--surface-hi); }
    .card-actions .btn-delete:hover { color: var(--error); background: transparent; }

    /* ── Modal ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open {
      display: flex;
      animation: backdrop-in 0.2s ease both;
    }
    .modal-backdrop.open .modal {
      animation: modal-in 0.22s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 26px 26px 22px;
      width: 440px;
      max-width: calc(100vw - 32px);
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    .modal h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .field { margin-bottom: 14px; }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .field input,
    .field textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
      resize: vertical;
    }
    .field input:focus,
    .field textarea:focus { border-color: var(--accent); }
    .field input::placeholder,
    .field textarea::placeholder { color: var(--text-muted); }

    .field textarea { min-height: 72px; }

    .field .hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 20px;
    }

    .btn-cancel {
      padding: 7px 14px;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      color: var(--text-muted);
      transition: color 0.1s, border-color 0.1s;
    }
    .btn-cancel:hover { color: var(--text); border-color: var(--text-muted); }

    .btn-save {
      padding: 7px 16px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-save:hover { background: var(--accent-hover); }

    .field-error {
      font-size: 11px;
      color: var(--error);
      margin-top: 4px;
      display: none;
    }

    /* ── Inline edit form ── */
    .edit-field { margin-bottom: 10px; }

    .edit-field label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .edit-field input,
    .edit-field textarea {
      width: 100%;
      padding: 6px 9px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      outline: none;
      resize: vertical;
      transition: border-color 0.15s;
    }
    .edit-field input::placeholder,
    .edit-field textarea::placeholder { color: var(--text-muted); }
    .edit-field input:focus,
    .edit-field textarea:focus { border-color: var(--accent); }
    .edit-field textarea { min-height: 58px; }

    .edit-field .hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    .edit-field .field-error {
      font-size: 11px;
      color: var(--error);
      margin-top: 3px;
      display: none;
    }

    .edit-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 14px;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--surface);
      border: 1px solid var(--error);
      color: var(--error);
      font-size: 13px;
      padding: 10px 18px;
      border-radius: var(--radius);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      white-space: nowrap;
      z-index: 200;
    }
    #toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <h1>Bookmark Manager</h1>
    <input id="search" type="search" placeholder="Search bookmarks…" autocomplete="off" />
    <button id="btn-add">+ Add Bookmark</button>
  </header>

  <!-- Body -->
  <div class="body">
    <!-- Sidebar -->
    <aside>
      <h2>Tags</h2>
      <ul id="tag-list"></ul>
    </aside>

    <!-- Main -->
    <main>
      <div id="empty-state">
        <p>No bookmarks yet.</p>
        <span class="hint">Click <strong>+ Add Bookmark</strong> to save your first link.</span>
      </div>
      <div id="bookmark-list"></div>
    </main>
  </div>

  <!-- Toast -->
  <div id="toast" role="alert" aria-live="assertive"></div>

  <!-- Add / Edit Modal -->
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <h2 id="modal-title">Add Bookmark</h2>
      <div class="field">
        <label for="f-url">URL</label>
        <input id="f-url" type="url" placeholder="https://example.com" />
        <div class="field-error" id="err-url">Please enter a valid URL.</div>
      </div>
      <div class="field">
        <label for="f-title">Title</label>
        <input id="f-title" type="text" placeholder="Site name or description" />
        <div class="field-error" id="err-title">Title is required.</div>
      </div>
      <div class="field">
        <label for="f-notes">Notes</label>
        <textarea id="f-notes" placeholder="Optional notes…"></textarea>
      </div>
      <div class="field">
        <label for="f-tags">Tags</label>
        <input id="f-tags" type="text" placeholder="python, tutorial, read-later" />
        <div class="hint">Separate tags with commas.</div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="btn-cancel">Cancel</button>
        <button class="btn-save" id="btn-save">Save</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'bookmarks';

    // ── Storage helpers ──────────────────────────────────────────────────────

    function normalizeBookmark(b) {
      if (!b || typeof b !== 'object') return null;
      return {
        id:        typeof b.id        === 'number' ? b.id : Date.now(),
        url:       typeof b.url       === 'string' ? b.url   : '',
        title:     typeof b.title     === 'string' ? b.title : '',
        notes:     typeof b.notes     === 'string' ? b.notes : '',
        tags:      Array.isArray(b.tags) ? b.tags.filter(t => typeof t === 'string') : [],
        createdAt: typeof b.createdAt === 'string' ? b.createdAt : new Date().toISOString(),
      };
    }

    function load() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (!Array.isArray(parsed)) return [];
        return parsed.map(normalizeBookmark).filter(Boolean);
      } catch { return []; }
    }

    let toastTimer;
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('visible');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('visible'), 4000);
    }

    function save(bookmarks) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(bookmarks));
      } catch (e) {
        if (e instanceof DOMException && (e.name === 'QuotaExceededError' || e.name === 'NS_ERROR_DOM_QUOTA_REACHED')) {
          showToast('Storage full — bookmark could not be saved.');
        }
      }
    }

    function addBookmark(data) {
      const bookmarks = load();
      bookmarks.unshift({
        id: Date.now(),
        url: data.url,
        title: data.title,
        notes: data.notes,
        tags: data.tags,
        createdAt: new Date().toISOString(),
      });
      save(bookmarks);
    }

    function deleteBookmark(id) {
      save(load().filter(b => b.id !== id));
    }

    function extractDomain(url) {
      try { return new URL(url).hostname.replace(/^www\./, ''); }
      catch { return ''; }
    }

    function updateBookmark(id, data) {
      const bookmarks = load();
      const idx = bookmarks.findIndex(b => b.id === id);
      if (idx === -1) return;
      bookmarks[idx] = { ...bookmarks[idx], ...data };
      save(bookmarks);
    }

    // ── State ────────────────────────────────────────────────────────────────

    let activeTag = 'All';
    let searchQuery = '';

    // ── Render ───────────────────────────────────────────────────────────────

    function parseTags(raw) {
      return raw.split(',').map(t => t.trim().toLowerCase()).filter(Boolean);
    }

    function renderAll() {
      const bookmarks = load();
      renderSidebar(bookmarks);
      renderBookmarks(bookmarks);
    }

    function renderSidebar(bookmarks) {
      const counts = {};
      bookmarks.forEach(b => b.tags.forEach(t => { counts[t] = (counts[t] || 0) + 1; }));
      const tags = Object.keys(counts).sort();

      if (activeTag !== 'All' && !tags.includes(activeTag)) activeTag = 'All';

      const list = document.getElementById('tag-list');
      list.innerHTML = '';

      const allBtn = makeTagButton('All', bookmarks.length);
      list.appendChild(allBtn);

      tags.forEach(tag => {
        list.appendChild(makeTagButton(tag, counts[tag]));
      });
    }

    function makeTagButton(label, count) {
      const li = document.createElement('li');
      const btn = document.createElement('button');
      const labelSpan = document.createElement('span');
      labelSpan.textContent = label;
      const countSpan = document.createElement('span');
      countSpan.className = 'count';
      countSpan.textContent = count;
      btn.appendChild(labelSpan);
      btn.appendChild(countSpan);
      if (label === activeTag) btn.classList.add('active');
      btn.addEventListener('click', () => {
        activeTag = label;
        renderAll();
      });
      li.appendChild(btn);
      return li;
    }

    function renderBookmarks(bookmarks) {
      let filtered = bookmarks;

      if (activeTag !== 'All') {
        filtered = filtered.filter(b => b.tags.includes(activeTag));
      }

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(b =>
          b.title.toLowerCase().includes(q) ||
          b.url.toLowerCase().includes(q) ||
          b.notes.toLowerCase().includes(q) ||
          b.tags.some(t => t.includes(q))
        );
      }

      const empty = document.getElementById('empty-state');
      const list = document.getElementById('bookmark-list');
      list.innerHTML = '';

      if (filtered.length === 0) {
        const emptyP    = empty.querySelector('p');
        const emptyHint = empty.querySelector('.hint');
        if (bookmarks.length === 0) {
          emptyP.textContent  = 'No bookmarks yet.';
          emptyHint.innerHTML = 'Click <strong>+ Add Bookmark</strong> to save your first link.';
        } else if (searchQuery) {
          emptyP.textContent  = `No results for "${searchQuery}".`;
          emptyHint.textContent = 'Try a different search term.';
        } else {
          emptyP.textContent    = `No bookmarks tagged "${activeTag}".`;
          emptyHint.textContent = 'Select a different tag or clear the filter.';
        }
        empty.style.display = 'flex';
      } else {
        empty.style.display = 'none';
        filtered.forEach(b => list.appendChild(makeCard(b)));
      }
    }

    function animateSwap(card) {
      card.classList.remove('card--swap');
      void card.offsetWidth;
      card.classList.add('card--swap');
    }

    function fillCard(card, b) {
      card.innerHTML = '';
      animateSwap(card);

      const header = document.createElement('div');
      header.className = 'card-header';

      const title = document.createElement('div');
      title.className = 'card-title';
      title.textContent = b.title;
      header.appendChild(title);

      const domain = extractDomain(b.url);
      if (domain) {
        const domainEl = document.createElement('span');
        domainEl.className = 'card-domain';
        domainEl.textContent = domain;
        header.appendChild(domainEl);
      }

      const url = document.createElement('a');
      url.className = 'card-url';
      url.href = b.url;
      url.target = '_blank';
      url.rel = 'noopener noreferrer';
      url.textContent = b.url;

      const footer = document.createElement('div');
      footer.className = 'card-footer';

      b.tags.forEach(tag => {
        const span = document.createElement('span');
        span.className = 'tag';
        span.textContent = tag;
        footer.appendChild(span);
      });

      const actions = document.createElement('div');
      actions.className = 'card-actions';

      const editBtn = document.createElement('button');
      editBtn.textContent = 'Edit';
      editBtn.addEventListener('click', () => enterEditMode(card, b));
      actions.appendChild(editBtn);

      const delBtn = document.createElement('button');
      delBtn.className = 'btn-delete';
      delBtn.textContent = 'Delete';
      delBtn.addEventListener('click', () => {
        deleteBookmark(b.id);
        renderAll();
      });
      actions.appendChild(delBtn);
      footer.appendChild(actions);

      card.appendChild(header);
      card.appendChild(url);

      if (b.notes) {
        const notes = document.createElement('div');
        notes.className = 'card-notes';
        notes.textContent = b.notes;
        card.appendChild(notes);
      }

      card.appendChild(footer);
    }

    function makeCard(b) {
      const card = document.createElement('div');
      card.className = 'card';
      fillCard(card, b);
      return card;
    }

    function enterEditMode(card, b) {
      card.innerHTML = '';
      animateSwap(card);

      function makeEditField(labelText, inputEl, hint) {
        const wrap = document.createElement('div');
        wrap.className = 'edit-field';
        const lbl = document.createElement('label');
        lbl.textContent = labelText;
        wrap.appendChild(lbl);
        wrap.appendChild(inputEl);
        if (hint) {
          const h = document.createElement('div');
          h.className = 'hint';
          h.textContent = hint;
          wrap.appendChild(h);
        }
        const err = document.createElement('div');
        err.className = 'field-error';
        wrap.appendChild(err);
        return { wrap, err };
      }

      const eUrl = Object.assign(document.createElement('input'), { type: 'url', value: b.url });
      const { wrap: urlWrap, err: urlErr } = makeEditField('URL', eUrl);

      const eTitle = Object.assign(document.createElement('input'), { type: 'text', value: b.title });
      const { wrap: titleWrap, err: titleErr } = makeEditField('Title', eTitle);

      const eNotes = Object.assign(document.createElement('textarea'), { value: b.notes });
      const { wrap: notesWrap } = makeEditField('Notes', eNotes);

      const eTags = Object.assign(document.createElement('input'), { type: 'text', value: b.tags.join(', ') });
      const { wrap: tagsWrap } = makeEditField('Tags', eTags, 'Separate tags with commas.');

      card.appendChild(urlWrap);
      card.appendChild(titleWrap);
      card.appendChild(notesWrap);
      card.appendChild(tagsWrap);

      const actions = document.createElement('div');
      actions.className = 'edit-actions';

      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'btn-cancel';
      cancelBtn.textContent = 'Cancel';
      cancelBtn.addEventListener('click', () => fillCard(card, b));

      const saveBtn = document.createElement('button');
      saveBtn.className = 'btn-save';
      saveBtn.textContent = 'Save';
      saveBtn.addEventListener('click', () => {
        const newUrl = eUrl.value.trim();
        const newTitle = eTitle.value.trim();
        let ok = true;

        urlErr.style.display = titleErr.style.display = 'none';

        if (!newUrl || !isValidUrl(newUrl)) {
          urlErr.textContent = 'Please enter a valid URL.';
          urlErr.style.display = 'block';
          ok = false;
        }
        if (!newTitle) {
          titleErr.textContent = 'Title is required.';
          titleErr.style.display = 'block';
          ok = false;
        }
        if (!ok) return;

        updateBookmark(b.id, {
          url: newUrl,
          title: newTitle,
          notes: eNotes.value.trim(),
          tags: parseTags(eTags.value),
        });
        renderAll();
      });

      actions.appendChild(cancelBtn);
      actions.appendChild(saveBtn);
      card.appendChild(actions);

      eUrl.focus();
    }

    // ── Modal ────────────────────────────────────────────────────────────────

    const backdrop = document.getElementById('modal-backdrop');
    const fUrl     = document.getElementById('f-url');
    const fTitle   = document.getElementById('f-title');
    const fNotes   = document.getElementById('f-notes');
    const fTags    = document.getElementById('f-tags');
    const errUrl   = document.getElementById('err-url');
    const errTitle = document.getElementById('err-title');

    function openModal() {
      fUrl.value = fTitle.value = fNotes.value = fTags.value = '';
      errUrl.style.display = errTitle.style.display = 'none';
      backdrop.classList.add('open');
      fUrl.focus();
    }

    function closeModal() {
      backdrop.classList.remove('open');
    }

    function validateAndSave() {
      let ok = true;
      const url = fUrl.value.trim();
      const title = fTitle.value.trim();

      errUrl.style.display = 'none';
      errTitle.style.display = 'none';

      if (!url || !isValidUrl(url)) {
        errUrl.style.display = 'block';
        ok = false;
      }
      if (!title) {
        errTitle.style.display = 'block';
        ok = false;
      }
      if (!ok) return;

      addBookmark({
        url,
        title,
        notes: fNotes.value.trim(),
        tags: parseTags(fTags.value),
      });
      closeModal();
      renderAll();
    }

    function isValidUrl(str) {
      try {
        const u = new URL(str);
        return (u.protocol === 'http:' || u.protocol === 'https:') &&
               /^https?:\/\/[^/]/.test(str) &&
               u.hostname.includes('.');
      } catch { return false; }
    }

    document.getElementById('btn-add').addEventListener('click', openModal);
    document.getElementById('btn-cancel').addEventListener('click', closeModal);
    document.getElementById('btn-save').addEventListener('click', validateAndSave);

    backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
      if (e.key === 'Enter' && backdrop.classList.contains('open') &&
          document.activeElement !== fNotes) {
        validateAndSave();
      }
    });

    // ── Search ───────────────────────────────────────────────────────────────

    document.getElementById('search').addEventListener('input', e => {
      searchQuery = e.target.value.trim();
      renderAll();
    });

    // ── Init ─────────────────────────────────────────────────────────────────

    renderAll();
  </script>
</body>
</html>
